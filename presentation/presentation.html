<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Labyrinth of Zero-Trust</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #0a0e14;
    --text-primary: #e0e0e0;
    --text-secondary: #a0aec0;
    --accent: #4ecdc4;
    --accent-dark: #1a1a2e;
    --panel-bg: rgba(22, 33, 62, 0.6);
    --border-color: rgba(74, 74, 106, 0.4);
    --attack-color: #e94560;
    --thread-color: #00b4d8;
    --success-color: #39ff14;
    --warning-color: #ff9f43;
  }

  body {
    margin: 0;
    background: radial-gradient(circle at 50% 50%, #151b29 0%, var(--bg-color) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    overflow-x: hidden;
  }

  .glass {
    background: var(--panel-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
  }

  .controls {
    margin: 15px 0 10px 0;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px 20px;
    border-radius: 12px;
    z-index: 10;
  }

  .controls button {
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .controls button:hover {
    background: rgba(78, 205, 196, 0.1);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  .controls button.active {
    background: rgba(78, 205, 196, 0.15);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 700;
    box-shadow: 0 0 15px rgba(78, 205, 196, 0.2);
  }

  .slide-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 12px;
  }

  .slide-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 0.5px;
    text-shadow: 0 0 10px rgba(78, 205, 196, 0.2);
  }

  .progress-dots {
    display: flex;
    gap: 10px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border-color);
    transition: all 0.3s ease;
  }

  .dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    transform: scale(1.3);
  }

  .context-box {
    width: 95vw;
    max-width: 1600px;
    border-radius: 12px;
    padding: 16px 24px;
    margin-top: 15px;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    box-sizing: border-box;
    z-index: 10;
  }

  .context-box .context-title {
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 15px;
  }

  .context-box ul {
    margin: 8px 0 0 0;
    padding-left: 20px;
  }
  
  .context-box li {
    margin-bottom: 6px;
  }

  .context-box em, .context-box code { 
    color: var(--accent); 
    font-style: normal; 
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
    background: rgba(78, 205, 196, 0.1);
    padding: 2px 5px;
    border-radius: 4px;
    border: 1px solid rgba(78, 205, 196, 0.2);
  }
  
  .context-box strong { color: var(--text-primary); font-weight: 600; }

  svg { 
    width: 95vw;
    max-width: 1600px;
    height: auto;
    border-radius: 12px; 
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    background: #0f141e;
  }

  svg text {
    font-family: 'JetBrains Mono', monospace;
  }

  .nav-hint { 
    font-size: 12px; 
    color: var(--text-secondary); 
    margin-top: 12px; 
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.6;
  }

  /* Interactive Elements */
  .interactive {
    cursor: help;
    transition: filter 0.2s;
  }
  
  .interactive:hover {
    filter: brightness(1.3);
  }

  /* Drawing Animations */
  .path-draw {
    stroke-dasharray: 3000;
    stroke-dashoffset: 3000;
  }
  
  .anim-trigger .path-draw {
    animation: drawPath 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  @keyframes drawPath {
    to { stroke-dashoffset: 0; }
  }

  /* Pulse animation for blocked attacks */
  .pulse-block {
    animation: pulseRed 2s infinite;
  }

  @keyframes pulseRed {
    0% { filter: drop-shadow(0 0 2px var(--attack-color)); }
    50% { filter: drop-shadow(0 0 8px var(--attack-color)); }
    100% { filter: drop-shadow(0 0 2px var(--attack-color)); }
  }
  
  /* Make the active slide elements fade in smoothly */
  .slide-layer {
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  
  .slide-layer.active {
    opacity: 1;
    pointer-events: auto;
  }
  
  /* Tooltip styling logic (if we wanted custom HTML tooltips, but native <title> works for SVG) */
</style>
</head>

<script>
const slides = [
  {
    title: "1. The Naked Application — The Unrestricted Maze",
    context: `
      <div class="context-title">Developer Context:</div>
      <ul>
        <li>Without behavior mapping, a container is an open field. The maze walls represent code module boundaries — structurally present but providing zero runtime enforcement.</li>
        <li>An RCE exploit cuts diagonally through the dependency tree, completely bypassing intended logic.</li>
        <li>It reaches the kernel and successfully calls <em>execve()</em> to spawn a shell.</li>
        <li><strong>Result:</strong> The application has no authority over what syscalls its own process can make.</li>
      </ul>
    `,
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'blueThread', 'redAttackSlide1', 'syscalls', 'legend']
  },
  {
    title: "2. The General BoB — Kernel-Level Whitelist",
    context: `
      <div class="context-title">Developer Context:</div>
      <ul>
        <li><strong>BoB (Bill of Behavior):</strong> A profile defining exactly what actions (syscalls, file access) a container is allowed to perform, enforced via eBPF.</li>
        <li>The General BoB profiles the container's aggregate allowed behaviors. The attack still traverses the internal corridors (the <em>Merge Fallacy</em> — hundreds of dependencies merged into one broad profile).</li>
        <li>However, when it attempts <em>execve()</em>, the syscall is <strong>not in the whitelist</strong> and is denied.</li>
        <li><strong>Key Insight:</strong> Enforcement happens in the kernel, not user-space. The attack reaches the boundary but chokes at the syscall gate.</li>
      </ul>
    `,
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'blueThread', 'hardenedWalls', 'execveDenied', 'redAttackSlide2', 'syscalls', 'legend']
  },
  {
    title: "3. Lifecycle Partitioning — Temporal Denial",
    context: `
      <div class="context-title">Developer Context:</div>
      <ul>
        <li>Even with <em>execve()</em> denied, an attacker might try to load a malicious shared library.</li>
        <li>During Startup, loading native libraries (requiring <em>mprotect</em> or <em>mmap</em> with <code>PROT_EXEC</code>) is legitimately needed. But once the Kubernetes readiness probe passes, the Startup phase is sealed.</li>
        <li>The eBPF profile <strong>drops sensitive syscalls from the whitelist entirely</strong> for the Runtime phase.</li>
        <li>The attack reaches the kernel, attempts to make memory executable (<em>mprotect</em>), and gets phase-denied. Startup capabilities (secret reading, class loading) become permanently inaccessible.</li>
      </ul>
    `,
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'blueThread', 'hardenedWalls', 'execveDenied', 'startupBulkhead', 'shutdownGate', 'redAttackSlide3', 'syscalls', 'legend']
  },
  {
    title: "4. Stacktrace Enforcement — Call-Path Binding",
    context: `
      <div class="context-title">Developer Context:</div>
      <ul>
        <li>The General BoB allows <em>read()</em> because many modules need it. But <em>which</em> code path triggered it?</li>
        <li>A user-space agent uses DWARF symbols to map allowed call stacks to fixed <strong>Instruction Pointers (IPs)</strong>. The kernel eBPF program unwinds the stack at syscall entry and verifies the IPs against this allowed map.</li>
        <li>The red attack achieves RCE and hijacks execution via a <strong>ROP chain</strong> through the Logging library, attempting to call <em>read()</em>.</li>
        <li>The eBPF stack unwinder detects that the actual IP sequence doesn't match the expected call-path, neutralizing code-path hijacking even when the syscall itself is whitelisted.</li>
      </ul>
    `,
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'hardenedWalls', 'execveDenied', 'startupBulkhead', 'shutdownGate', 'stacktraceEnforcement', 'syscalls', 'legend']
  },
  {
    title: "5. Thread-Scoped Context — Defeating the Confused Deputy",
    context: `
      <div class="context-title">Developer Context:</div>
      <ul>
        <li>The stacktrace matches perfectly: <em>DownloadController → File.read()</em>. The code isn't hijacked; it's tricked by malicious input (e.g., <em>../../etc/passwd</em>). This is the <strong>Confused Deputy</strong> problem.</li>
        <li><strong>Solution:</strong> The app runtime pushes dynamic thread context (user role, tenant ID) into an eBPF-readable kernel map.</li>
        <li>At the <strong>eBPF LSM (Linux Security Module)</strong> layer, the kernel securely resolves the path and checks not just <em>what</em> code called it, but <em>on whose behalf</em> and with what data boundaries.</li>
        <li><strong>Examples:</strong> Restricting a JSON parser to its specific input buffer, or preventing cross-tenant file access at the syscall layer.</li>
      </ul>
    `,
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'hardenedWalls', 'execveDenied', 'startupBulkhead', 'shutdownGate', 'threadScope', 'syscalls', 'legend']
  }
];

let currentSlide = 0;

function goToSlide(index) {
  // Remove animation trigger class from svg container to reset animations
  const diagram = document.getElementById('diagram');
  diagram.classList.remove('anim-trigger');
  
  // Force a reflow to ensure the animation reset is processed
  void diagram.offsetWidth;
  
  currentSlide = index;
  const slide = slides[index];

  document.getElementById('slideTitle').textContent = slide.title;
  document.getElementById('contextBox').innerHTML = slide.context;

  // Update Buttons and Dots
  for (let i = 0; i < 5; i++) {
    document.getElementById('btn' + i).classList.remove('active');
    document.getElementById('dot' + i).classList.remove('active');
  }
  document.getElementById('btn' + index).classList.add('active');
  document.getElementById('dot' + index).classList.add('active');

  // Handle slide visibility via the .active class
  const allLayers = [
    'startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'blueThread', 
    'redAttackSlide1', 'syscalls', 'legend', 'hardenedWalls', 'execveDenied', 
    'redAttackSlide2', 'startupBulkhead', 'shutdownGate', 'redAttackSlide3', 
    'stacktraceEnforcement', 'threadScope'
  ];

  allLayers.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      if (slide.show.includes(id)) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    }
  });

  // Re-add animation trigger class to start the SVG path drawings
  diagram.classList.add('anim-trigger');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (currentSlide < 4) goToSlide(currentSlide + 1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentSlide > 0) goToSlide(currentSlide - 1);
  }
});

// Initialize
goToSlide(0);
</script>
