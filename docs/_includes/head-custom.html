<!-- Load Mermaid JS from CDN and automatically render markdown code blocks -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  
  document.addEventListener("DOMContentLoaded", function() {
    // Select all mermaid code blocks generated by Kramdown/Jekyll
    const codeBlocks = document.querySelectorAll('pre code.language-mermaid, .language-mermaid pre code, .language-mermaid pre');
    
    codeBlocks.forEach(block => {
      let container = block;
      // Navigate up to find the container div or pre block to replace
      while (container && !container.classList.contains('language-mermaid') && container.tagName !== 'PRE') {
        container = container.parentElement;
      }
      
      if (container) {
        const diagramText = block.innerText || block.textContent;
        const mermaidDiv = document.createElement('div');
        mermaidDiv.className = 'mermaid';
        mermaidDiv.textContent = diagramText.trim();
        
        container.parentNode.replaceChild(mermaidDiv, container);
      }
    });

    mermaid.initialize({
      startOnLoad: true,
      theme: 'default'
    });
  });
</script>
