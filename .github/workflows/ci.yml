name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    static-analysis:
        name: Static Analysis
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  # Only provide the key if the secret is actually set
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Run Linting
              run: ./gradlew detekt spotbugsMain spotbugsTest --build-cache --configuration-cache --no-daemon

    security-scan:
        name: Security Scan
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  gradle-home-cache-includes: |
                      caches
                      notifications
                      dependency-check-data
            - name: Run Dependency Check
              run: ./gradlew dependencyCheckAnalyze --no-configuration-cache --no-daemon --info
              env:
                  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV
                  echo "MAZEWALL_CONTAINER_ENGINE=podman" >> $GITHUB_ENV
            - name: Run Unit Tests (Containerized)
              run: ./gradlew :test --tests ContainerizedTestRunner -Dmazewall.container.tasks=":enforcer:test :profiler:test" --build-cache --configuration-cache
            - name: Run Coverage Verification
              run: ./gradlew jacocoTestReport jacocoTestCoverageVerification -x test -x integrationTest --build-cache --configuration-cache

    integration-tests:
        name: Integration Tests
        needs: unit-tests
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV
                  echo "MAZEWALL_CONTAINER_ENGINE=podman" >> $GITHUB_ENV
            - name: Run Integration Tests (Containerized)
              run: ./gradlew :test --tests ContainerizedTestRunner -Dmazewall.container.tasks=":enforcer:integrationTest :profiler:integrationTest" --build-cache --configuration-cache
            - name: Run Coverage Verification
              run: ./gradlew jacocoTestReport jacocoTestCoverageVerification -x test -x integrationTest --build-cache --configuration-cache

    mutation-tests:
        name: Mutation Tests
        needs: unit-tests
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Run PITest (Host)
              run: ./gradlew :enforcer:pitest -Dpitest.threads=12 --build-cache --configuration-cache

    demo-tests:
        name: Demos & Showcase
        needs: integration-tests
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV
                  echo "MAZEWALL_CONTAINER_ENGINE=podman" >> $GITHUB_ENV
            - name: Run Web App Demo
              run: ./gradlew :demos:vulnerable-web-app:test --tests VulnerableWebAppIntegrationTest --build-cache --configuration-cache
            - name: Run CLI Demo Tests
              run: ./gradlew :demos:cli-demo:test --build-cache --configuration-cache

    publish:
        name: Publish
        needs: [integration-tests, mutation-tests, static-analysis, security-scan]
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        runs-on: ubuntu-24.04
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Publish to GitHub Packages
              run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --info --no-parallel --no-configuration-cache
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
