name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    test:
        name: Build and Test
        runs-on: ubuntu-24.04
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  gradle-version: wrapper
                  # Enable caching for both build results and configuration
                  cache-read-only: false
                  # Use configuration cache if possible
                  arguments: --configuration-cache

            - name: Grant Execute Permission for Gradlew
              run: chmod +x gradlew

            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV

            - name: Cache Podman Image
              id: cache-podman
              uses: actions/cache@v4
              with:
                  path: /tmp/mazewall-dev.tar
                  key: ${{ runner.os }}-podman-${{ hashFiles('infra/dev/Containerfile', 'infra/dev/compose.yml') }}

            - name: Load Podman Image
              if: steps.cache-podman.outputs.cache-hit == 'true'
              run: podman load -i /tmp/mazewall-dev.tar

            - name: Build test container
              if: steps.cache-podman.outputs.cache-hit != 'true'
              run: |
                  cd ./infra/dev
                  podman compose build
                  podman save -o /tmp/mazewall-dev.tar mazewall-dev:latest

            - name: Start Environment
              run: podman compose -f infra/dev/compose.yml up -d

            - name: Build & Compile
              run: podman compose -f infra/dev/compose.yml exec -T mazewall ./gradlew classes --build-cache --configuration-cache
              env:
                  GRADLE_USER_HOME: /home/runner/.gradle

            - name: Run Unit Tests
              run: podman compose -f infra/dev/compose.yml exec -T mazewall ./gradlew test --build-cache --configuration-cache
              env:
                  IO_MAZEWALL_TEST: "true"
                  GRADLE_USER_HOME: /home/runner/.gradle

            - name: Run Integration Tests
              run: podman compose -f infra/dev/compose.yml exec -T mazewall ./gradlew integrationTest --build-cache --configuration-cache
              env:
                  IO_MAZEWALL_TEST: "true"
                  GRADLE_USER_HOME: /home/runner/.gradle

            - name: Run Linting
              if: success() || failure()
              run: podman compose -f infra/dev/compose.yml exec -T mazewall ./gradlew detekt spotbugsMain spotbugsTest --build-cache --configuration-cache
              env:
                  GRADLE_USER_HOME: /home/runner/.gradle

            - name: Run Coverage Verification
              if: success() || failure()
              run: podman compose -f infra/dev/compose.yml exec -T mazewall ./gradlew jacocoTestReport jacocoTestCoverageVerification --build-cache --configuration-cache
              env:
                  GRADLE_USER_HOME: /home/runner/.gradle

            - name: Publish to GitHub Packages
              # Only publish on main/master branch pushes, not for PRs
              if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
              run: |
                  podman compose -f infra/dev/compose.yml exec -T \
                    -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
                    -e GITHUB_ACTOR="${{ github.actor }}" \
                    mazewall ./gradlew publishAllPublicationsToGitHubPackagesRepository --info --no-parallel --no-configuration-cache
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
                  GRADLE_USER_HOME: /home/runner/.gradle

            - name: Upload Build Artifacts (JARs)
              if: success()
              uses: actions/upload-artifact@v4
              with:
                  name: mazewall-artifacts
                  path: |
                      enforcer/build/libs/*.jar
                      profiler/build/libs/*.jar
                  retention-days: 5

            - name: Upload Test Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: junit-reports
                  path: "**/build/reports/tests/**"
                  retention-days: 5

            - name: Upload Coverage Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-reports
                  path: "**/build/reports/jacoco/**"
                  retention-days: 5
