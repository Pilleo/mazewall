name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    analysis:
        name: Static Analysis
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
            - name: Run Linting
              run: ./gradlew detekt spotbugsMain spotbugsTest dependencyCheckAnalyze --build-cache --configuration-cache --no-daemon

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV
                  echo "MAZEWALL_CONTAINER_ENGINE=podman" >> $GITHUB_ENV
            - name: Run Unit Tests (Containerized)
              run: ./gradlew :test --tests ContainerizedTestRunner -Dmazewall.container.tasks=":enforcer:test :profiler:test" --build-cache --configuration-cache

    integration-tests:
        name: Integration Tests
        needs: unit-tests
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV
                  echo "MAZEWALL_CONTAINER_ENGINE=podman" >> $GITHUB_ENV
            - name: Run Integration Tests (Containerized)
              run: ./gradlew :test --tests ContainerizedTestRunner -Dmazewall.container.tasks=":enforcer:integrationTest :profiler:integrationTest" --build-cache --configuration-cache

    demo-tests:
        name: Demos & Showcase
        needs: integration-tests
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV
                  echo "MAZEWALL_CONTAINER_ENGINE=podman" >> $GITHUB_ENV
            - name: Run Web App Demo
              run: ./gradlew :demos:vulnerable-web-app:test --tests VulnerableWebAppIntegrationTest --build-cache --configuration-cache
            - name: Run CLI Demo Tests
              run: ./gradlew :demos:cli-demo:test --build-cache --configuration-cache

    publish:
        name: Publish
        needs: [integration-tests, analysis]
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        runs-on: ubuntu-24.04
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
            - name: Publish to GitHub Packages
              run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --info --no-parallel --no-configuration-cache
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}

    reports:
        name: Reports & Coverage
        needs: [integration-tests, demo-tests]
        if: always()
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
            - name: Run Coverage Verification
              run: ./gradlew jacocoTestReport jacocoTestCoverageVerification --build-cache --configuration-cache
            - name: Upload Test Reports
              uses: actions/upload-artifact@v4
              with:
                  name: junit-reports
                  path: "**/build/reports/tests/**"
                  retention-days: 5
            - name: Upload Coverage Report
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-reports
                  path: "**/build/reports/jacoco/**"
                  retention-days: 5
