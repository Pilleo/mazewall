name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    test:
        name: Build and Test
        # ubuntu-24.04 provides a 6.8+ kernel which supports Landlock and FFM
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant Execute Permission for Gradlew
              run: chmod +x gradlew

            - name: Run Build and Tests
              # We don't need to skip tests here because GitHub runners have modern kernels.
              # We also pass a flag to ensure JIT warmup doesn't time out in CI.
              run: ./gradlew check --info
              env:
                  IO_MAZEWALL_TEST: "true"

            - name: Upload Build Artifacts (JARs)
              if: success()
              uses: actions/upload-artifact@v4
              with:
                  name: mazewall-artifacts
                  path: "**/build/libs/*.jar"
                  retention-days: 5

            - name: Upload Test Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: junit-reports
                  path: "**/build/reports/tests/test"
                  retention-days: 5
