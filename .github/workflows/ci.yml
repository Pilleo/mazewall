name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    build-test-publish:
        name: Build, Test, Security Scan & Publish
        runs-on: ubuntu-24.04
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
                  gradle-home-cache-includes: |
                      dependency-check-data
            - name: Grant Execute Permission for Gradlew
              run: chmod +x gradlew
            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV
                  echo "MAZEWALL_CONTAINER_ENGINE=podman" >> $GITHUB_ENV
            - name: Run Build, Lint & Test
              run: ./gradlew build
            - name: Run PITest (Host Unit Tests Only)
              run: ./gradlew :enforcer:pitest -Dpitest.threads=2 --no-parallel
            - name: Run Security Check
              run: ./gradlew dependencyCheckAnalyze --info --no-configuration-cache
              env:
                  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
            - name: Publish to GitHub Packages
              if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
              run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --info --no-parallel --no-configuration-cache
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
