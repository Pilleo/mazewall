name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    security-scan:
        name: Security Scan
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  gradle-home-cache-includes: |
                      caches
                      notifications
                      dependency-check-data
            - name: Grant Execute Permission for Gradlew
              run: chmod +x gradlew
            - name: Run Dependency Check
              run: ./gradlew dependencyCheckAnalyze --no-configuration-cache --no-daemon --info
              env:
                  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    tests:
        name: Build, Lint & Test Suite
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Grant Execute Permission for Gradlew
              run: chmod +x gradlew
            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV
                  echo "MAZEWALL_CONTAINER_ENGINE=podman" >> $GITHUB_ENV
            - name: Run Build, Lint & Test Suite
              run: ./gradlew build --build-cache --configuration-cache

    mutation-tests:
        name: Mutation Tests
        needs: tests
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Grant Execute Permission for Gradlew
              run: chmod +x gradlew
            - name: Run PITest (Host)
              run: ./gradlew :enforcer:pitest -Dpitest.threads=12 --build-cache --configuration-cache

    publish:
        name: Publish
        needs: [tests, mutation-tests, security-scan]
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        runs-on: ubuntu-24.04
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
            - name: Grant Execute Permission for Gradlew
              run: chmod +x gradlew
            - name: Publish to GitHub Packages
              run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --info --no-parallel --no-configuration-cache
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
