name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    build-test-publish:
        name: Build, Test, Security Scan & Publish
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        permissions:
            contents: read
            packages: write
            pull-requests: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
                  gradle-home-cache-includes: |
                      caches
                      notifications
                      dependency-check-data
            - name: Grant Execute Permission for Gradlew
              run: chmod +x gradlew
            - name: Setup Podman Socket
              run: |
                  systemctl --user enable --now podman.socket
                  echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV
                  echo "MAZEWALL_CONTAINER_ENGINE=podman" >> $GITHUB_ENV
            - name: Restore Podman Cache
              id: cache-podman
              uses: actions/cache/restore@v4
              with:
                  path: ${{ github.workspace }}/.cache/podman-image
                  key: podman-image-${{ hashFiles('infra/dev/Containerfile', 'demos/vulnerable-web-app/Containerfile') }}-${{ github.sha }}
                  restore-keys: |
                      podman-image-${{ hashFiles('infra/dev/Containerfile', 'demos/vulnerable-web-app/Containerfile') }}-
                      podman-image-
            - name: Load Cached Podman Images
              run: |
                  if [ -f ${{ github.workspace }}/.cache/podman-image/mazewall-test-runner.tar ]; then
                      podman load -i ${{ github.workspace }}/.cache/podman-image/mazewall-test-runner.tar
                  fi
                  if [ -f ${{ github.workspace }}/.cache/podman-image/vulnerable-web-app-unprotected.tar ]; then
                      podman load -i ${{ github.workspace }}/.cache/podman-image/vulnerable-web-app-unprotected.tar
                  fi
                  if [ -f ${{ github.workspace }}/.cache/podman-image/vulnerable-web-app-protected.tar ]; then
                      podman load -i ${{ github.workspace }}/.cache/podman-image/vulnerable-web-app-protected.tar
                  fi
            - name: Run Containerized Build, Lint, Tests & Coverage Verification
              run: |
                  set -o pipefail
                  ./scripts/run_containerized_tests.sh build 2>&1 | tee build.log
            - name: Run PITest (Host Unit Tests Only)
              run: ./scripts/run_containerized_tests.sh :enforcer:pitest -Dpitest.threads=2
            - name: Run Vulnerability Exploitation Demo
              run: ./scripts/run_vulnerable_app_demo.sh
            - name: Save All Podman Images to Cache Folder
              run: |
                  EXPECTED_PREFIX="podman-image-${{ hashFiles('infra/dev/Containerfile', 'demos/vulnerable-web-app/Containerfile') }}-"
                  MATCHED_KEY="${{ steps.cache-podman.outputs.cache-matched-key }}"
                  echo "Matched Key: $MATCHED_KEY"
                  echo "Expected Prefix: $EXPECTED_PREFIX"
                  if [[ "$MATCHED_KEY" != "$EXPECTED_PREFIX"* ]]; then
                      echo "Containerfiles changed or no cache matched. Cleaning up old cached tarballs..."
                      rm -f ${{ github.workspace }}/.cache/podman-image/*.tar
                  fi
                  mkdir -p ${{ github.workspace }}/.cache/podman-image
                  if [ ! -f ${{ github.workspace }}/.cache/podman-image/mazewall-test-runner.tar ]; then
                      podman save -o ${{ github.workspace }}/.cache/podman-image/mazewall-test-runner.tar mazewall-test-runner:latest
                  fi
                  if [ ! -f ${{ github.workspace }}/.cache/podman-image/vulnerable-web-app-unprotected.tar ] && podman image exists vulnerable-web-app-unprotected; then
                      podman save -o ${{ github.workspace }}/.cache/podman-image/vulnerable-web-app-unprotected.tar vulnerable-web-app-unprotected:latest
                  fi
                  if [ ! -f ${{ github.workspace }}/.cache/podman-image/vulnerable-web-app-protected.tar ] && podman image exists vulnerable-web-app-protected; then
                      podman save -o ${{ github.workspace }}/.cache/podman-image/vulnerable-web-app-protected.tar vulnerable-web-app-protected:latest
                  fi
            - name: Upload Podman Image Cache
              uses: actions/cache/save@v4
              if: |
                  steps.cache-podman.outputs.cache-matched-key == '' ||
                  !startsWith(steps.cache-podman.outputs.cache-matched-key, format('podman-image-{0}-', hashFiles('infra/dev/Containerfile', 'demos/vulnerable-web-app/Containerfile')))
              with:
                  path: ${{ github.workspace }}/.cache/podman-image
                  key: podman-image-${{ hashFiles('infra/dev/Containerfile', 'demos/vulnerable-web-app/Containerfile') }}-${{ github.sha }}
            - name: Run Security Check
              run: ./scripts/run_containerized_tests.sh dependencyCheckAnalyze --info
              env:
                  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
            - name: Publish to GitHub Packages
              if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
              run: ./scripts/run_containerized_tests.sh publishAllPublicationsToGitHubPackagesRepository --info
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}

