services:
  jseccomp:
    build: .
    volumes:
      - .:/workspace
    # Audit subsystem requires sharing the host network namespace and initial user namespace.
    # This is necessary for the Profiler to ingest asynchronous io_uring operations.
    network_mode: host
    userns_mode: host
    cap_add:
      - AUDIT_READ
      - AUDIT_CONTROL
    # Use a custom seccomp profile via annotation to whitelist filter stacking.
    # This maintains container isolation while allowing nested sandboxes.
    annotations:
      io.podman.annotations.seccomp: ${PWD}/podman-seccomp.json
    working_dir: /workspace
    # Default to keeping the container alive for execution
    command: tail -f /dev/null
