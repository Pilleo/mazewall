services:
    mazewall:
        image: mazewall-dev:latest
        build:
            context: ../..
            dockerfile: infra/dev/Containerfile
        volumes:
            - ../..:/workspace
            - ${GRADLE_USER_HOME:-~/.gradle}:/root/.gradle
        environment:
            - GRADLE_USER_HOME=/root/.gradle
            - GITHUB_ACTOR
            - GITHUB_TOKEN
        # Use a custom seccomp profile via annotation to whitelist filter stacking.
        # This maintains container isolation while allowing nested sandboxes.
        annotations:
            io.podman.annotations.seccomp: ${PWD}/infra/dev/podman-seccomp.json
        working_dir: /workspace
        # Default to keeping the container alive for execution
        command: tail -f /dev/null
