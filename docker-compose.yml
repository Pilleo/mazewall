services:
  jseccomp:
    build: .
    volumes:
      - .:/workspace
    # Workaround for Podman: Use annotation instead of security_opt
    # to prevent Docker Compose from reading and passing the raw JSON string
    # which causes an ENAMETOOLONG "file name too long" error in Podman.
    annotations:
      io.podman.annotations.seccomp: ${PWD}/docker-seccomp.json
    working_dir: /workspace
    # Default to keeping the container alive for execution
    command: tail -f /dev/null
